simulated_readers:
  - id: R1
    name: 爽点读者
    cares:
      - 主角境界突破/装逼打脸爽不爽
      - 以下犯上是否合理且过瘾
      - 憋屈有没有及时释放

  - id: R2
    name: 节奏读者
    cares:
      - 修炼描写是否拖沓
      - 玄学解释是否太多
      - 章尾是否想追

  - id: R3
    name: 设定读者
    cares:
      - 境界体系是否扎实
      - 灵根/丹药/法器逻辑是否自洽
      - 跨境是否被尊重

  - id: R4
    name: 道心读者
    cares:
      - 主角的"道"是否清晰
      - 抉择是否符合道心
      - 是否在为长生/复仇/守护其中之一奔

  - id: R5
    name: 情义读者
    cares:
      - 师徒/同门/道侣关系是否动人
      - 配角是否有自己的道
      - 情感张力是否真实
