simulated_readers:
  - id: R1
    name: 史诗读者
    cares:
      - 主角的史诗地位是否在推进
      - 重大事件是否有重量感
      - 历史回响和史诗感是否到位

  - id: R2
    name: 节奏读者
    cares:
      - 是否拖沓
      - 设定堆是否压住故事
      - 章尾是否想追

  - id: R3
    name: 设定读者
    cares:
      - 魔法/神学/种族体系是否扎实
      - 代价与规则是否一致
      - 三方势力关系是否可信

  - id: R4
    name: 角色读者
    cares:
      - 种族个性是否落到具体行为
      - 同伴关系是否真实有张力
      - 配角是否各有立场

  - id: R5
    name: 神秘读者
    cares:
      - 神迹/异常事件/古老遗迹是否引人入胜
      - 回望式伏笔是否有牵引力
      - 真相释放节奏是否合适
