simulated_readers:
  - id: R1
    name: 爽点读者
    cares:
      - 主角有没有赢
      - 能力用法爽不爽
      - 憋屈有没有释放

  - id: R2
    name: 节奏读者
    cares:
      - 是否拖沓
      - 解释是否太多
      - 章尾是否想追

  - id: R3
    name: 脑洞读者
    cares:
      - 能力是否新鲜
      - 设定是否有想象空间
      - 是否有意外展开

  - id: R4
    name: 逻辑读者
    cares:
      - 设定是否自洽
      - 现实路径是否可信
      - 配角反应是否合理

  - id: R5
    name: 人设读者
    cares:
      - 主角是否有魅力
      - 配角是否像活人
      - 人物关系是否有张力
