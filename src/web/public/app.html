<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="legacy-app-name" content="AuthorOS Private Web">
  <title>AuthorOS Personal Cockpit</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f7fb; color: #1d2430; }
    header { display: grid; grid-template-columns: minmax(180px, auto) minmax(0, 1fr); align-items: center; gap: 16px; padding: 18px 24px; border-bottom: 1px solid #d9dee7; background: #ffffff; }
    h1 { margin: 0; font-size: 22px; line-height: 1.2; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    button, textarea, input { font: inherit; }
    button { border: 1px solid #1f5eff; background: #1f5eff; color: #fff; border-radius: 7px; padding: 8px 12px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    button.secondary { background: #fff; color: #1d2430; border-color: #b9c2d0; }
    input { width: 100%; border: 1px solid #b9c2d0; border-radius: 7px; padding: 8px 10px; background: #fff; color: inherit; }
    textarea { width: 100%; min-height: 92px; resize: vertical; border: 1px solid #b9c2d0; border-radius: 8px; padding: 10px; background: #fff; color: inherit; }
    .muted { color: #667085; font-size: 13px; }
    .header-title { display: grid; gap: 4px; }
    .resident-shell { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 10px 14px; min-width: 0; }
    .resident-heading { font-size: 12px; font-weight: 700; color: #344054; }
    .resident-item { display: grid; gap: 2px; min-width: 112px; }
    .resident-label { color: #667085; font-size: 11px; }
    .resident-value { overflow: hidden; color: #1d2430; font-size: 13px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .cockpit { display: grid; grid-template-columns: 240px minmax(0, 1fr) 300px; gap: 16px; max-width: 1440px; margin: 0 auto; padding: 16px 24px 24px; }
    .panel { min-width: 0; border: 1px solid #d9dee7; border-radius: 8px; background: #fff; padding: 16px; }
    .stack { display: grid; gap: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .book { display: grid; gap: 4px; padding: 10px; border: 1px solid #e5e9f0; border-radius: 7px; background: #fafbfc; }
    .book.current { border-color: #1f5eff; background: #eef4ff; }
    .book-title { font-weight: 600; }
    .next-action { display: grid; gap: 8px; }
    .workspace { display: grid; gap: 16px; }
    .current-book { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .quality-loop { display: grid; gap: 12px; }
    .next-chapter-card, .preview-card { display: grid; gap: 8px; padding: 12px; border: 1px solid #d9dee7; border-radius: 7px; background: #fafbfc; }
    .style-profile { display: grid; gap: 8px; }
    .style-extract { display: grid; gap: 8px; padding-top: 8px; border-top: 1px solid #e5e9f0; }
    .style-actions { display: grid; gap: 8px; }
    .profile-option { display: grid; gap: 6px; padding: 10px; border: 1px solid #e5e9f0; border-radius: 7px; background: #fafbfc; }
    .stage-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .stage-pill { display: inline-flex; align-items: center; border: 1px solid #d9dee7; border-radius: 999px; padding: 5px 9px; background: #fff; color: #344054; font-size: 12px; font-weight: 600; }
    .stage-pill.done { border-color: #98d7aa; background: #edf8f0; color: #176b37; }
    .stage-pill.next { border-color: #91b5ff; background: #eef4ff; color: #1f4fbf; }
    .stage-pill.missing { border-color: #f2b3b3; background: #fff1f1; color: #9a2a2a; }
    .stage-pill.optional { border-color: #d9dee7; background: #f5f7fb; color: #667085; }
    .signal-danger { color: #9a2a2a; font-weight: 700; }
    .signal-warning { color: #946200; font-weight: 700; }
    .signal-ok { color: #176b37; font-weight: 700; }
    .chapter { min-height: 280px; max-height: 58vh; overflow: auto; white-space: pre-wrap; line-height: 1.7; }
    .chat-log { min-height: 260px; max-height: 44vh; overflow: auto; display: flex; flex-direction: column; gap: 10px; white-space: pre-wrap; }
    .msg { padding: 10px 12px; border: 1px solid #d9dee7; border-radius: 8px; background: #fff; }
    .me { align-self: flex-end; max-width: 86%; background: #eaf2ff; }
    .assistant { align-self: flex-start; max-width: 86%; }
    .error { border-color: #f1b8b8; background: #fff1f1; }
    .job { display: grid; gap: 4px; padding: 10px; border: 1px solid #e5e9f0; border-radius: 7px; background: #fafbfc; }
    .job-top { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; font-weight: 600; }
    @media (max-width: 1100px) {
      header { align-items: flex-start; grid-template-columns: 1fr; }
      .resident-shell { justify-content: flex-start; }
      .cockpit { grid-template-columns: 1fr; padding: 14px; }
      .chapter, .chat-log { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <h1>AuthorOS Personal Cockpit</h1>
      <span id="sessionStatus" class="muted" data-testid="session-status">正在检查会话...</span>
    </div>
    <section class="resident-shell" data-testid="resident-shell" aria-label="常驻会话">
      <span class="resident-heading">常驻会话</span>
      <div class="resident-item">
        <span class="resident-label">服务</span>
        <span id="residentService" class="resident-value">检查中...</span>
      </div>
      <div class="resident-item">
        <span class="resident-label">当前书</span>
        <span id="residentBook" class="resident-value">暂无当前书</span>
      </div>
      <div class="resident-item">
        <span class="resident-label">任务</span>
        <span id="residentTask" class="resident-value">暂无任务</span>
      </div>
      <button class="secondary" id="resumeSession" disabled>恢复现场</button>
    </section>
  </header>
  <main class="cockpit">
    <aside class="panel stack" aria-label="书架">
      <section>
        <h2>书架</h2>
        <div id="books" class="stack muted">加载中...</div>
      </section>
      <section class="next-action">
        <h2>下一步</h2>
        <button id="nextAction" data-testid="next-action" disabled>加载中...</button>
        <div id="nextActionHint" class="muted">我会根据当前书籍状态推荐动作。</div>
      </section>
    </aside>

    <section class="workspace">
      <div class="panel current-book">
        <div>
          <h2>工作区当前创作现场</h2>
          <div id="currentBookTitle" class="book-title">还没有当前书。</div>
          <div id="currentBookMeta" class="muted">开一本新书后，这里会显示创作状态。</div>
        </div>
        <div class="row">
          <button class="secondary" id="refresh">刷新</button>
          <button class="secondary" id="readLatest">读最新章</button>
          <button class="secondary" id="downloadChapter">下载当前章</button>
          <button class="secondary" id="downloadAll">下载全部章节</button>
        </div>
      </div>
      <section class="panel quality-loop" data-testid="quality-loop" aria-label="质量环路">
        <div>
          <h2>质量环路</h2>
          <div id="qualitySignal" class="muted">加载质量环路...</div>
        </div>
        <div id="nextChapterCard" class="next-chapter-card" data-testid="next-chapter-card"></div>
        <div id="qualityStages" class="stage-grid"></div>
        <div id="pendingPreview" class="preview-card" data-testid="pending-preview"></div>
        <div id="memoryReview" class="preview-card"></div>
        <div id="recoveryHint" class="preview-card"></div>
      </section>
      <h2>当前章节</h2>
      <article class="panel chapter" id="chapter" data-testid="chapter-reader">还没有读取章节。</article>
    </section>

    <aside class="stack">
      <section class="panel style-profile" data-testid="style-profile" aria-label="文风档案">
        <h2>文风档案</h2>
        <div id="styleProfileStatus" class="book-title">尚未绑定文风</div>
        <div id="styleGenerationStatus" class="muted">生成接入：检查中...</div>
        <div id="styleGenerationDetail" class="muted"></div>
        <div id="styleProfileMeta" class="muted">档案数量：0</div>
        <div id="styleProfileDetail" class="muted">还没有可用文风档案。</div>
        <div class="style-extract">
          <h3>提炼文风</h3>
          <input id="styleProfileName" placeholder="文风名称">
          <textarea id="styleReferenceText" placeholder="粘贴样文"></textarea>
          <div class="row">
            <button id="extractStyleAndBind">提炼并绑定</button>
            <button class="secondary" id="extractStyleOnly">仅提炼</button>
          </div>
          <div id="styleExtractHint" class="muted"></div>
        </div>
        <div id="styleProfileActions" class="style-actions"></div>
      </section>
      <section class="panel stack">
        <h2>作者助理</h2>
        <div id="chatLog" class="chat-log" data-testid="assistant-chat"></div>
        <textarea id="message" placeholder="开一本新书、继续写、读最新章，或直接说哪里要改"></textarea>
        <button id="send">发送</button>
      </section>
      <section class="panel stack">
        <h2>任务中心</h2>
        <div id="taskCenter" class="stack muted" data-testid="task-center">还没有任务。</div>
      </section>
    </aside>
  </main>
  <script>
    const chatLog = document.querySelector('#chatLog');
    const taskCenter = document.querySelector('#taskCenter');
    const chapter = document.querySelector('#chapter');
    const books = document.querySelector('#books');
    const sessionStatus = document.querySelector('#sessionStatus');
    const residentService = document.querySelector('#residentService');
    const residentBook = document.querySelector('#residentBook');
    const residentTask = document.querySelector('#residentTask');
    const resumeSession = document.querySelector('#resumeSession');
    const nextAction = document.querySelector('#nextAction');
    const nextActionHint = document.querySelector('#nextActionHint');
    const currentBookTitle = document.querySelector('#currentBookTitle');
    const currentBookMeta = document.querySelector('#currentBookMeta');
    const qualitySignal = document.querySelector('#qualitySignal');
    const nextChapterCard = document.querySelector('#nextChapterCard');
    const qualityStages = document.querySelector('#qualityStages');
    const pendingPreview = document.querySelector('#pendingPreview');
    const memoryReview = document.querySelector('#memoryReview');
    const recoveryHint = document.querySelector('#recoveryHint');
    const styleProfileStatus = document.querySelector('#styleProfileStatus');
    const styleGenerationStatus = document.querySelector('#styleGenerationStatus');
    const styleGenerationDetail = document.querySelector('#styleGenerationDetail');
    const styleProfileMeta = document.querySelector('#styleProfileMeta');
    const styleProfileDetail = document.querySelector('#styleProfileDetail');
    const styleProfileActions = document.querySelector('#styleProfileActions');
    const styleProfileName = document.querySelector('#styleProfileName');
    const styleReferenceText = document.querySelector('#styleReferenceText');
    const styleExtractHint = document.querySelector('#styleExtractHint');
    const messageInput = document.querySelector('#message');
    const roomPrefix = (location.pathname.match(/^\/room\/[^/]+/) || [''])[0];
    const tokenKey = `authoros_token:${roomPrefix || 'single'}`;
    const activeStyleHintPrefix = '下一章将使用文风';
    let token = sessionStorage.getItem(tokenKey) || '';
    let cockpit = null;

    function headers() {
      return { 'content-type': 'application/json', authorization: `Bearer ${token}` };
    }

    async function api(path, options = {}) {
      const response = await fetch(`${roomPrefix}${path}`, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      if (!response.ok) {
        let payload = {};
        try {
          payload = await response.json();
        } catch {
          payload = {};
        }
        throw new Error(payload.error || response.statusText);
      }
      return response.json();
    }

    function addMessage(text, own = false, error = false) {
      const div = document.createElement('div');
      div.className = `msg ${own ? 'me' : 'assistant'}${error ? ' error' : ''}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    async function loginIfNeeded() {
      const session = await fetch('/api/session').then(response => response.json());
      if (!session.tokenRequired) {
        sessionStatus.textContent = session.rooms ? '请选择房间' : '本机会话已连接';
        return true;
      }
      token = sessionStorage.getItem(tokenKey) || prompt('访问码（如果没有配置可留空）') || '';
      if (!token) {
        sessionStatus.textContent = '等待访问码';
        return false;
      }
      if (session.rooms && !roomPrefix) {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (!response.ok) {
          alert((await response.json()).error || 'invalid access code');
          sessionStorage.removeItem(tokenKey);
          location.reload();
          return false;
        }
        const result = await response.json();
        sessionStorage.setItem(`authoros_token:${result.roomPath}`, token);
        location.href = result.roomPath;
        return false;
      }
      sessionStorage.setItem(tokenKey, token);
      sessionStatus.textContent = roomPrefix ? `房间 ${roomPrefix.replace('/room/', '')} 已连接` : '本机会话已连接';
      return true;
    }

    async function loadCockpit() {
      cockpit = await api('/api/cockpit');
      renderCockpit(cockpit);
      renderJobs(cockpit.jobs || []);
      if (cockpit.current && cockpit.current.latestChapter) await loadLatestChapter(false);
    }

    function renderCockpit(data) {
      const model = data.model || {};
      sessionStatus.textContent = `${model.model || '默认模型'} · ${model.apiKeySet ? 'API key 已配置' : 'API key 未配置'}`;
      renderResidentShell(data.session);
      books.innerHTML = '';
      if (!data.books || data.books.length === 0) {
        books.textContent = '还没有书。';
      } else {
        for (const book of data.books) {
          const item = document.createElement('div');
          item.className = `book${data.current && data.current.book.id === book.id ? ' current' : ''}`;
          const title = document.createElement('div');
          title.className = 'book-title';
          title.textContent = book.title;
          const meta = document.createElement('div');
          meta.className = 'muted';
          meta.textContent = `${book.id} · ${book.concept || '暂无概念'}`;
          item.append(title, meta);
          books.appendChild(item);
        }
      }

      if (data.current) {
        const latest = data.current.latestChapter ? `最新第 ${data.current.latestChapter.chapter} 章` : '还没有章节';
        currentBookTitle.textContent = data.current.book.title;
        currentBookMeta.textContent = `${data.current.book.id} · ${latest} · 下一章 ${data.current.state.nextDraftChapter}`;
      } else {
        currentBookTitle.textContent = '还没有当前书。';
        currentBookMeta.textContent = '开一本新书后，这里会显示创作状态。';
      }

      if (data.nextAction && data.nextAction.message) {
        nextAction.textContent = data.nextAction.label;
        nextAction.dataset.message = data.nextAction.message;
        nextAction.disabled = false;
        const hint = data.nextAction.kind === 'new_book' ? '告诉助理你想写什么。' : data.nextAction.message;
        const styleHint = nextActionStyleHint(data.nextAction);
        nextActionHint.textContent = styleHint ? `${hint} · ${styleHint}` : hint;
      } else {
        nextAction.textContent = '暂无建议';
        nextAction.dataset.message = '';
        nextAction.disabled = true;
        nextActionHint.textContent = '刷新后再看看。';
      }
      renderQuality(data.quality, data.jobs || []);
      renderStyle(data.style);
    }

    function renderResidentShell(session) {
      const service = session && session.service ? session.service : { label: '本机服务检查中' };
      const book = session && session.currentBook ? session.currentBook : { label: '暂无当前书' };
      const task = session && session.currentTask
        ? `正在：${session.currentTask.label}`
        : session && session.lastCompleted
        ? `最近完成：${session.lastCompleted.label}`
        : '暂无任务';
      residentService.textContent = service.label || '本机服务在线';
      residentBook.textContent = book.label || '暂无当前书';
      residentTask.textContent = task;
      resumeSession.textContent = session && session.resume ? session.resume.label : '恢复现场';
      resumeSession.disabled = !(session && session.resume && session.resume.available);
      resumeSession.title = session && session.currentTask
        ? session.currentTask.detail
        : session && session.lastCompleted
        ? session.lastCompleted.detail
        : '刷新并回到当前创作现场';
    }

    function renderStyle(style) {
      const profiles = style && Array.isArray(style.profiles) ? style.profiles : [];
      const current = style && style.currentProfile ? style.currentProfile : null;
      const generation = style && style.generation ? style.generation : null;
      if (current) {
        styleProfileStatus.textContent = `已绑定：${current.name || current.id}`;
      } else {
        styleProfileStatus.textContent = '尚未绑定文风';
      }
      styleProfileMeta.textContent = `档案数量：${profiles.length}`;
      renderStyleGeneration(generation);
      const detailSource = current || profiles[0] || null;
      const antiAiVoice = detailSource && detailSource.rules && Array.isArray(detailSource.rules.antiAiVoice)
        ? detailSource.rules.antiAiVoice.find(Boolean)
        : '';
      const detail = detailSource && (detailSource.description || antiAiVoice);
      const rulesPreview = styleRulesPreview(detailSource);
      const fallback = profiles.length > 0 ? '可以从已有档案中绑定当前书。' : '还没有可用文风档案。';
      styleProfileDetail.textContent = [
        detail || fallback,
        rulesPreview ? `规则预览：${rulesPreview}` : '',
      ].filter(Boolean).join('\n');
      renderStyleActions(profiles, current, generation);
    }

    function styleRulesPreview(profile) {
      if (!profile || !profile.rules) return '';
      const rules = [];
      if (Array.isArray(profile.rules.antiAiVoice)) rules.push(...profile.rules.antiAiVoice);
      if (Array.isArray(profile.rules.avoid)) rules.push(...profile.rules.avoid);
      return rules.filter(Boolean).slice(0, 2).join('；');
    }

    function nextActionStyleHint(action) {
      if (!action || !action.styleHint) return '';
      return action.styleHint.includes(activeStyleHintPrefix)
        ? action.styleHint
        : `${activeStyleHintPrefix}：${action.styleHint}`;
    }

    function renderStyleGeneration(generation) {
      const label = generation && generation.label ? generation.label : '未启用';
      styleGenerationStatus.textContent = `生成接入：${label}`;
      styleGenerationStatus.className = generation && generation.active
        ? 'signal-ok'
        : generation && generation.label !== '尚未绑定文风'
        ? 'signal-warning'
        : 'muted';
      styleGenerationDetail.textContent = generation && generation.detail ? generation.detail : '绑定文风后，下一章生成才会收到文风档案。';
    }

    function renderStyleActions(profiles, current, generation) {
      styleProfileActions.innerHTML = '';
      if (!cockpit || !cockpit.current) {
        styleProfileActions.textContent = '开书后可以绑定文风。';
        return;
      }

      if (current) {
        const syncButton = document.createElement('button');
        syncButton.className = 'secondary';
        syncButton.textContent = generation && generation.active ? '重新同步到写作生成' : '同步到写作生成';
        syncButton.addEventListener('click', () => bindStyleProfileFromCockpit(current.id));
        styleProfileActions.appendChild(syncButton);
      }

      if (!profiles.length) {
        const empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = '还没有可绑定的文风档案。';
        styleProfileActions.appendChild(empty);
        return;
      }

      for (const profile of profiles) {
        const option = document.createElement('div');
        option.className = 'profile-option';
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = profile.name || profile.id;
        const meta = document.createElement('div');
        meta.className = 'muted';
        meta.textContent = profile.description || profile.id;
        const button = document.createElement('button');
        button.className = 'secondary';
        button.textContent = current && profile.id === current.id ? '已绑定' : '绑定到当前书';
        button.disabled = Boolean(current && profile.id === current.id);
        button.addEventListener('click', () => bindStyleProfileFromCockpit(profile.id));
        option.append(title, meta, button);
        styleProfileActions.appendChild(option);
      }
    }

    async function bindStyleProfileFromCockpit(profileId) {
      try {
        await api('/api/style/bind', { method: 'POST', body: JSON.stringify({ profileId }) });
        addMessage('文风已同步到写作生成。');
        await loadCockpit();
      } catch (error) {
        addMessage(`文风绑定失败：${error.message}`, false, true);
      }
    }

    async function extractStyleFromCockpit(bind) {
      const name = styleProfileName.value.trim();
      const text = styleReferenceText.value.trim();
      if (!name || !text) {
        styleExtractHint.textContent = '需要填写名称和样文。';
        return;
      }
      styleExtractHint.textContent = '正在提炼文风...';
      try {
        const result = await api('/api/style/extract', {
          method: 'POST',
          body: JSON.stringify({ name, text, bind }),
        });
        styleProfileName.value = '';
        styleReferenceText.value = '';
        const summary = formatStyleSummary(result.summary);
        styleExtractHint.textContent = summary || (result.binding ? '已提炼并绑定。' : '已提炼。');
        addMessage([
          result.binding ? '文风已提炼并绑定到当前书。' : '文风已提炼，开书后可绑定。',
          summary,
        ].filter(Boolean).join('\n'));
        await loadCockpit();
      } catch (error) {
        styleExtractHint.textContent = `提炼失败：${error.message}`;
        addMessage(`提炼文风失败：${error.message}`, false, true);
      }
    }

    function formatStyleSummary(summary) {
      if (!summary) return '';
      const rules = Array.isArray(summary.rulesPreview) ? summary.rulesPreview.filter(Boolean).slice(0, 2).join('；') : '';
      return [
        `${summary.name || '新文风'}：${summary.description || '已生成文风档案。'}`,
        rules ? `规则预览：${rules}` : '',
      ].filter(Boolean).join('\n');
    }

    function renderQuality(quality, jobs = []) {
      const booklessRecovery = quality ? null : deriveBooklessRecovery(jobs);
      const signal = booklessRecovery
        ? { kind: 'danger', label: `上次任务失败：${jobPhaseLabel(booklessRecovery.failedPhase)}` }
        : quality && quality.signals && quality.signals.length > 0
        ? quality.signals[0]
        : { kind: 'ok', label: '没有当前书' };
      qualitySignal.className = `signal-${signal.kind || 'ok'}`;
      qualitySignal.textContent = signal.label || '质量环路暂无阻塞';

      nextChapterCard.innerHTML = '';
      qualityStages.innerHTML = '';
      pendingPreview.innerHTML = '';
      memoryReview.innerHTML = '';
      recoveryHint.innerHTML = '';

      if (!quality) {
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = '没有当前书';
        const meta = document.createElement('div');
        meta.className = 'muted';
        meta.textContent = '开一本新书后，这里会显示下一章生产线。';
        nextChapterCard.append(title, meta);
        pendingPreview.textContent = '没有待确认预览。';
        memoryReview.textContent = '没有记忆更新。';
        if (booklessRecovery) {
          renderRecovery(booklessRecovery);
        } else {
          recoveryHint.textContent = '没有失败恢复。';
        }
        return;
      }

      const next = quality.nextChapter;
      if (next) {
        const label = document.createElement('div');
        label.className = 'book-title';
        label.textContent = next.label || `第 ${next.chapter} 章生产线`;
        const state = document.createElement('div');
        state.className = 'muted';
        state.textContent = next.blockers && next.blockers.length > 0 ? next.blockers.join('；') : '可继续';
        nextChapterCard.append(label, state);

        for (const stage of next.stages || []) {
          qualityStages.appendChild(renderStagePill(stage));
        }
      } else {
        nextChapterCard.textContent = '没有当前书。';
      }

      if (quality.pendingPreview) {
        const previewTitle = document.createElement('div');
        previewTitle.className = 'book-title';
        previewTitle.textContent = `第 ${quality.pendingPreview.chapter} 章待确认预览`;
        const previewText = document.createElement('div');
        previewText.textContent = quality.pendingPreview.text;
        const previewMeta = document.createElement('div');
        previewMeta.className = 'muted';
        previewMeta.textContent = `${quality.pendingPreview.instruction} · ${quality.pendingPreview.createdAt}`;
        pendingPreview.append(previewTitle, previewText, previewMeta);
      }

      if (quality.styleRewritePreview) {
        const stylePreview = quality.styleRewritePreview;
        const styleTitle = document.createElement('div');
        styleTitle.className = 'book-title';
        styleTitle.textContent = `第 ${stylePreview.chapter} 章文风改写预览`;
        const styleText = document.createElement('div');
        styleText.textContent = `${stylePreview.profileName} · ${styleRewriteIntentLabel(stylePreview.intent)}`;
        const styleMeta = document.createElement('div');
        styleMeta.className = 'muted';
        styleMeta.textContent = `${stylePreview.rationale || stylePreview.text} · ${stylePreview.createdAt}`;
        const applyButton = document.createElement('button');
        applyButton.textContent = '应用文风修改';
        applyButton.addEventListener('click', () => sendMessage('应用文风修改').catch(error => addMessage(`失败：${error.message}`, false, true)));
        pendingPreview.append(styleTitle, styleText, styleMeta, applyButton);
      }

      if (!quality.pendingPreview && !quality.styleRewritePreview) {
        pendingPreview.textContent = '没有待确认预览。';
      }

      if (quality.memoryDeltas && quality.memoryDeltas.length > 0) {
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = '记忆更新待审阅';
        memoryReview.appendChild(title);
        for (const delta of quality.memoryDeltas) {
          const item = document.createElement('div');
          item.className = 'muted';
          item.textContent = `${delta.name} · ${delta.description}`;
          memoryReview.appendChild(item);
        }
      } else {
        memoryReview.textContent = '没有记忆更新。';
      }

      if (quality.recovery) {
        renderRecovery(quality.recovery);
      } else {
        recoveryHint.textContent = '没有失败恢复。';
      }
    }

    function renderRecovery(recovery) {
      const title = document.createElement('div');
      title.className = 'book-title';
      title.textContent = `失败恢复：${jobActionLabel(recovery.action)} · ${jobPhaseLabel(recovery.failedPhase)}`;
      const message = document.createElement('div');
      message.textContent = recovery.message;
      const suggestion = document.createElement('div');
      suggestion.className = 'muted';
      suggestion.textContent = recovery.suggestion;
      recoveryHint.append(title, message, suggestion);
    }

    function deriveBooklessRecovery(jobs) {
      const failed = (jobs || [])
        .filter(job => job.status === 'failed')
        .sort(compareJobsNewestFirst)[0];
      if (!failed) return null;
      const lastPhase = [...(failed.events || [])].reverse().find(event => event.type !== 'failed');

      return {
        action: failed.action,
        failedPhase: lastPhase ? lastPhase.type : failed.action,
        message: failed.error || '任务失败',
        suggestion: recoverySuggestion(failed.action),
      };
    }

    function compareJobsNewestFirst(a, b) {
      const byCreatedAt = String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      if (byCreatedAt !== 0) return byCreatedAt;

      const aSequence = jobSequence(a.id);
      const bSequence = jobSequence(b.id);
      if (aSequence !== undefined && bSequence !== undefined) return bSequence - aSequence;

      return String(b.id || '').localeCompare(String(a.id || ''));
    }

    function jobSequence(id) {
      const match = String(id || '').match(/^job-(\d+)$/);
      return match ? Number(match[1]) : undefined;
    }

    function recoverySuggestion(action) {
      if (action === 'read_chapter') return '确认已有正文后，再读取最新章。';
      if (action === 'continue_book') return '检查模型配置后，可以再次发送“继续写”。';
      return '查看失败原因后，重新执行上一步。';
    }

    function styleRewriteIntentLabel(intent) {
      const labels = {
        imitate_style: '仿写文风',
        remove_ai_voice: '去 AI 味',
        style_polish: '文风润色',
      };
      return labels[intent] || '文风改写';
    }

    function jobActionLabel(action) {
      const labels = {
        read_chapter: '读取章节',
        continue_book: '继续写作',
        feedback_preview: '生成修改预览',
        feedback_apply: '应用修改',
        style_rewrite_preview: '生成文风改写预览',
        style_rewrite_apply: '应用文风修改',
        new_book_confirmed: '创建新书',
        create_book_and_continue: '创建并续写',
        download_current_chapter: '下载当前章',
        download_all_chapters: '下载全部章节',
      };
      return labels[action] || action;
    }

    function jobPhaseLabel(phase) {
      const labels = {
        received: '接收任务',
        setup: '建立设定',
        planning: '规划章节',
        completed: '已完成',
        failed: '失败',
        revision_preview: '生成修改预览',
        applying: '应用修改',
        style_check: '生成文风改写预览',
        style_apply: '应用文风修改',
        interrupted: '任务中断',
      };
      return labels[phase] || phase;
    }

    function jobStatusLabel(status) {
      const labels = {
        running: '进行中',
        completed: '已完成',
        failed: '失败',
      };
      return labels[status] || status;
    }

    function renderStagePill(stage) {
      const pill = document.createElement('span');
      pill.className = `stage-pill ${stage.status}`;
      pill.textContent = `${stage.label} · ${stageStatusLabel(stage.status)}`;
      return pill;
    }

    function stageStatusLabel(status) {
      const labels = {
        done: '已完成',
        next: '下一步',
        missing: '缺失',
        optional: '可选',
      };
      return labels[status] || status;
    }

    async function refreshJobs() {
      const result = await api('/api/jobs');
      renderJobs(result.jobs || []);
    }

    function renderJobs(jobs) {
      taskCenter.innerHTML = '';
      if (!jobs || jobs.length === 0) {
        taskCenter.textContent = '还没有任务。';
        return;
      }
      for (const job of jobs.slice(0, 8)) {
        const last = job.events && job.events.length ? job.events[job.events.length - 1] : null;
        const item = document.createElement('div');
        item.className = 'job';
        const top = document.createElement('div');
        top.className = 'job-top';
        const action = document.createElement('span');
        action.textContent = jobActionLabel(job.action);
        const status = document.createElement('span');
        status.textContent = jobStatusLabel(job.status);
        top.append(action, status);
        const message = document.createElement('div');
        message.className = 'muted';
        message.textContent = last ? last.message : '等待事件。';
        item.append(top, message);
        taskCenter.appendChild(item);
      }
    }

    function announceJobCompletion(event) {
      const completion = event && event.data && event.data.completion ? event.data.completion : null;
      if (!completion) return;
      addMessage([
        '任务完成',
        completion.title,
        completion.detail,
        completion.next ? `下一步建议：${completion.next}` : '',
      ].filter(Boolean).join('\n'));
    }

    async function sendMessage(message) {
      addMessage(message, true);
      const result = await api('/api/chat', { method: 'POST', body: JSON.stringify({ message }) });
      addMessage(result.message || '已收到。');
      if (result.jobId) watchJob(result.jobId);
      await refreshJobs();
    }

    async function send() {
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.value = '';
      try {
        await sendMessage(message);
      } catch (error) {
        addMessage(`失败：${error.message}`, false, true);
      }
    }

    async function loadLatestChapter(showErrors = true) {
      try {
        const latest = await api('/api/chapters/latest');
        chapter.textContent = latest.content || latest.excerpt || '最新章节为空。';
      } catch (error) {
        if (showErrors) chapter.textContent = `读取失败：${error.message}`;
      }
    }

    async function resumeCurrentSession() {
      await loadCockpit();
      if (cockpit && cockpit.current) await loadLatestChapter(true);
      document.querySelector('.workspace').scrollIntoView({ block: 'start' });
    }

    function watchJob(id) {
      const events = new EventSource(`${roomPrefix}/api/jobs/${id}/events?token=${encodeURIComponent(token)}`);
      events.onmessage = (event) => {
        const data = JSON.parse(event.data);
        refreshJobs().catch(() => {});
        if (data.type === 'completed' || data.type === 'failed') {
          events.close();
          loadCockpit().catch(error => addMessage(`刷新失败：${error.message}`, false, true));
          if (data.type === 'completed') {
            announceJobCompletion(data);
            loadLatestChapter(false).catch(() => {});
          }
        }
      };
      events.onerror = () => events.close();
    }

    document.querySelector('#send').addEventListener('click', send);
    resumeSession.addEventListener('click', () => resumeCurrentSession().catch(error => addMessage(`恢复失败：${error.message}`, false, true)));
    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) send();
    });
    nextAction.addEventListener('click', () => {
      if (nextAction.dataset.message) sendMessage(nextAction.dataset.message).catch(error => addMessage(`失败：${error.message}`, false, true));
    });
    document.querySelector('#refresh').addEventListener('click', () => loadCockpit().catch(error => addMessage(`刷新失败：${error.message}`, false, true)));
    document.querySelector('#readLatest').addEventListener('click', () => loadLatestChapter(true));
    document.querySelector('#downloadChapter').addEventListener('click', () => location.href = `${roomPrefix}/download/chapter/latest?token=${encodeURIComponent(token)}`);
    document.querySelector('#downloadAll').addEventListener('click', () => location.href = `${roomPrefix}/download/chapters.zip?token=${encodeURIComponent(token)}`);
    document.querySelector('#extractStyleAndBind').addEventListener('click', () => extractStyleFromCockpit(true));
    document.querySelector('#extractStyleOnly').addEventListener('click', () => extractStyleFromCockpit(false));
    loginIfNeeded()
      .then(ready => ready ? loadCockpit() : undefined)
      .catch(error => {
        sessionStatus.textContent = `加载失败：${error.message}`;
        addMessage(`加载失败：${error.message}`, false, true);
      });
  </script>
</body>
</html>
