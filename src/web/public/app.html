<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="legacy-app-name" content="AuthorOS Private Web">
  <title>AuthorOS Personal Cockpit</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #f8faf9;
      --ink: #182230;
      --muted: #667085;
      --line: #d8dee8;
      --line-soft: #e7ebf0;
      --accent: #2457d6;
      --accent-soft: #edf3ff;
      --teal: #0f766e;
      --teal-soft: #eaf8f5;
      --amber: #a15c07;
      --amber-soft: #fff6e6;
      --danger: #b42318;
      --danger-soft: #fff0ef;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    header { position: sticky; top: 0; z-index: 10; display: grid; grid-template-columns: minmax(220px, 340px) minmax(0, 1fr); align-items: center; gap: 20px; padding: 14px 24px; border-bottom: 1px solid var(--line); background: rgba(255, 255, 255, .94); backdrop-filter: blur(12px); }
    h1 { margin: 0; font-size: 24px; line-height: 1.1; }
    h2 { margin: 0; font-size: 16px; line-height: 1.25; }
    h3 { margin: 0; font-size: 14px; line-height: 1.25; }
    button, textarea, input { font: inherit; }
    button { border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 7px; padding: 8px 12px; cursor: pointer; font-weight: 700; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    button.secondary { background: #fff; color: var(--ink); border-color: #b8c3d2; }
    input { width: 100%; border: 1px solid #b8c3d2; border-radius: 7px; padding: 8px 10px; background: #fff; color: inherit; }
    textarea { width: 100%; min-height: 92px; resize: vertical; border: 1px solid #b8c3d2; border-radius: 8px; padding: 10px; background: #fff; color: inherit; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .header-title { display: grid; gap: 4px; min-width: 0; }
    .eyebrow { color: var(--teal); font-size: 12px; font-weight: 800; }
    .resident-shell { display: grid; grid-template-columns: auto repeat(3, minmax(112px, 1fr)) auto; align-items: center; gap: 10px; min-width: 0; }
    .resident-heading { color: var(--muted); font-size: 12px; font-weight: 800; }
    .resident-item { display: grid; gap: 2px; min-width: 0; padding: 8px 10px; border: 1px solid var(--line-soft); border-radius: 8px; background: var(--panel-soft); }
    .resident-label { color: var(--muted); font-size: 11px; }
    .resident-value { overflow: hidden; color: var(--ink); font-size: 13px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
    .cockpit { display: grid; grid-template-columns: minmax(220px, 260px) minmax(0, 1fr) minmax(300px, 360px); gap: 18px; max-width: 1500px; margin: 0 auto; padding: 18px 24px 28px; }
    .desk-sidebar, .desk-rail { align-self: start; position: sticky; top: 86px; max-height: calc(100vh - 104px); overflow: auto; }
    .panel { min-width: 0; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 16px; }
    .panel.tight { padding: 14px; }
    .panel-subtitle { color: var(--muted); font-size: 12px; font-weight: 700; }
    .section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .stack { display: grid; gap: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .book { display: grid; gap: 4px; padding: 10px; border: 1px solid var(--line-soft); border-radius: 7px; background: var(--panel-soft); }
    .book.current { border-color: #9bb9ff; background: var(--accent-soft); }
    .book-title { font-weight: 800; }
    .next-action { display: grid; gap: 8px; padding: 12px; border: 1px solid #b8d6d0; border-radius: 8px; background: var(--teal-soft); }
    .workspace { display: grid; gap: 16px; }
    .current-book { display: grid; gap: 14px; border-color: #cbd8f5; background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%); }
    .current-book .book-title { font-size: 20px; }
    .context-copy { display: grid; gap: 8px; }
    .context-actions { justify-content: flex-start; }
    .quality-loop { display: grid; gap: 12px; }
    .next-chapter-card, .preview-card { display: grid; gap: 8px; padding: 12px; border: 1px solid var(--line-soft); border-radius: 7px; background: var(--panel-soft); }
    .chapter-panel { padding: 0; overflow: hidden; }
    .chapter-head { padding: 14px 16px; border-bottom: 1px solid var(--line-soft); background: #fff; }
    .chapter-workbench { display: grid; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); background: var(--panel-soft); }
    .chapter-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .chapter-list button { min-height: 32px; padding: 6px 10px; }
    .chapter-list button.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .style-profile { display: grid; gap: 8px; }
    .style-extract { display: grid; gap: 8px; padding-top: 8px; border-top: 1px solid var(--line-soft); }
    .style-actions { display: grid; gap: 8px; }
    .profile-option { display: grid; gap: 6px; padding: 10px; border: 1px solid var(--line-soft); border-radius: 7px; background: var(--panel-soft); }
    .stage-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .stage-pill { display: inline-flex; align-items: center; min-height: 28px; border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: #fff; color: #344054; font-size: 12px; font-weight: 700; }
    .stage-pill.done { border-color: #98d7aa; background: #edf8f0; color: #176b37; }
    .stage-pill.next { border-color: #91b5ff; background: var(--accent-soft); color: #1f4fbf; }
    .stage-pill.missing { border-color: #f2b3b3; background: var(--danger-soft); color: var(--danger); }
    .stage-pill.optional { border-color: var(--line); background: var(--bg); color: var(--muted); }
    .quality-actions-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .quality-actions-row button { min-height: 34px; }
    .memory-delta-content { max-height: 260px; overflow: auto; margin: 0; padding: 10px; border: 1px solid var(--line-soft); border-radius: 7px; background: #fff; white-space: pre-wrap; font: inherit; line-height: 1.55; }
    .signal-danger { color: var(--danger); font-weight: 800; }
    .signal-warning { color: var(--amber); font-weight: 800; }
    .signal-ok { color: #176b37; font-weight: 800; }
    .chapter { min-height: 420px; max-height: 58vh; overflow: auto; white-space: pre-wrap; line-height: 1.78; padding: 18px; font-size: 15px; }
    .assistant-panel { border-color: #cbd8f5; }
    .assistant-input { display: grid; gap: 8px; }
    .assistant-quick-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .quick-action { min-height: 34px; padding: 7px 9px; border-color: #b8c3d2; background: #fff; color: var(--ink); font-size: 12px; }
    .chat-log { min-height: 220px; max-height: 38vh; overflow: auto; display: flex; flex-direction: column; gap: 10px; white-space: pre-wrap; }
    .msg { padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; line-height: 1.5; }
    .me { align-self: flex-end; max-width: 88%; background: var(--accent-soft); }
    .assistant { align-self: flex-start; max-width: 86%; }
    .error { border-color: #f1b8b8; background: var(--danger-soft); }
    .job { display: grid; gap: 4px; padding: 10px; border: 1px solid var(--line-soft); border-radius: 7px; background: var(--panel-soft); }
    .job-top { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; font-weight: 800; }
    .phase-note { display: grid; gap: 4px; margin-top: 4px; padding: 8px 9px; border-left: 3px solid var(--teal); border-radius: 6px; background: #fff; }
    .phase-note-title { color: var(--ink); font-size: 12px; font-weight: 800; }
    .phase-note-body { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .recovery-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .recovery-actions button { min-height: 34px; }
    @media (max-width: 1180px) {
      header { align-items: flex-start; grid-template-columns: 1fr; }
      .resident-shell { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .resident-heading { grid-column: 1 / -1; }
      .cockpit { grid-template-columns: 1fr; padding: 14px; }
      .desk-sidebar, .desk-rail { position: static; max-height: none; overflow: visible; }
      .chapter, .chat-log { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <span class="eyebrow">个人写作桌面</span>
      <h1>AuthorOS</h1>
      <span id="sessionStatus" class="muted" data-testid="session-status">正在检查会话...</span>
    </div>
    <section class="resident-shell" data-testid="resident-shell" aria-label="常驻会话">
      <span class="resident-heading">常驻会话</span>
      <div class="resident-item">
        <span class="resident-label">服务</span>
        <span id="residentService" class="resident-value">检查中...</span>
      </div>
      <div class="resident-item">
        <span class="resident-label">当前书</span>
        <span id="residentBook" class="resident-value">暂无当前书</span>
      </div>
      <div class="resident-item">
        <span class="resident-label">任务</span>
        <span id="residentTask" class="resident-value">暂无任务</span>
      </div>
      <button class="secondary" id="resumeSession" disabled>恢复现场</button>
    </section>
  </header>
  <main class="cockpit writing-desk" data-testid="writing-desk">
    <aside class="desk-sidebar stack" data-testid="desk-sidebar" aria-label="创作导航">
      <section class="panel stack">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">工作流</span>
            <h2>创作导航</h2>
          </div>
        </div>
        <section class="next-action">
          <h3>下一步</h3>
          <button id="nextAction" data-testid="next-action" disabled>加载中...</button>
          <div id="nextActionHint" class="muted">我会根据当前书籍状态推荐动作。</div>
        </section>
      </section>
      <section class="panel stack" aria-label="书架">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">作品</span>
            <h2>书架</h2>
          </div>
        </div>
        <div id="books" class="stack muted">加载中...</div>
      </section>
    </aside>

    <section class="workspace desk-main" data-testid="desk-main">
      <section class="panel current-book book-context-card" data-testid="book-context-card">
        <div class="context-copy">
          <span class="panel-subtitle">今日写作台</span>
          <h2>创作现场</h2>
          <div id="currentBookTitle" class="book-title">还没有当前书。</div>
          <div id="currentBookMeta" class="muted">开一本新书后，这里会显示创作状态。</div>
        </div>
        <div class="row context-actions">
          <button class="secondary" id="refresh">刷新</button>
          <button class="secondary" id="readLatest">读最新章</button>
          <button class="secondary" id="downloadChapter">下载当前章</button>
          <button class="secondary" id="downloadAll">下载全部章节</button>
        </div>
      </section>
      <section class="panel chapter-panel">
        <div class="section-head chapter-head">
          <div>
            <span class="panel-subtitle">正文</span>
            <h2>当前章节</h2>
          </div>
        </div>
        <div class="chapter-workbench">
          <div class="muted">章节工作台</div>
          <div id="chapterList" class="chapter-list" data-testid="chapter-list">还没有已起草章节。</div>
        </div>
        <article class="chapter" id="chapter" data-testid="chapter-reader">还没有读取章节。</article>
      </section>
      <section class="panel quality-loop" data-testid="quality-loop" aria-label="质量环路">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">章节生产线</span>
            <h2>质量环路</h2>
          </div>
          <div id="qualitySignal" class="muted">加载质量环路...</div>
        </div>
        <div id="nextChapterCard" class="next-chapter-card" data-testid="next-chapter-card"></div>
        <div id="qualityStages" class="stage-grid"></div>
        <div id="qualityActions" class="preview-card quality-actions" data-testid="quality-actions"></div>
        <div id="qualityArtifacts" class="preview-card" data-testid="quality-artifacts"></div>
        <div id="pendingPreview" class="preview-card" data-testid="pending-preview"></div>
        <div id="memoryReview" class="preview-card" data-testid="memory-review"></div>
        <div id="recoveryHint" class="preview-card"></div>
      </section>
    </section>

    <aside class="desk-rail stack" data-testid="desk-rail">
      <section class="panel assistant-panel stack" data-testid="assistant-panel" aria-label="作者助理">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">常驻搭档</span>
            <h2>作者助理</h2>
          </div>
        </div>
        <div id="chatLog" class="chat-log" data-testid="assistant-chat"></div>
        <div class="assistant-quick-actions" data-testid="assistant-quick-actions" aria-label="作者助理快捷动作">
          <button class="quick-action" type="button" data-message="帮我继续推进当前书">继续推进</button>
          <button class="quick-action" type="button" data-message="读最新章">读最新章</button>
          <button class="quick-action" type="button" data-message="帮这一章去 AI 味">去 AI 味</button>
          <button class="quick-action" type="button" data-message="仿写文风处理这一章">仿写文风</button>
        </div>
        <div class="assistant-input">
          <textarea id="message" placeholder="开一本新书、继续写、读最新章，或直接说哪里要改"></textarea>
          <button id="send">发送</button>
        </div>
      </section>
      <section class="panel style-profile" data-testid="style-profile" aria-label="文风档案">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">文风档案</span>
            <h2>文风与资产</h2>
          </div>
        </div>
        <div id="styleProfileStatus" class="book-title">尚未绑定文风</div>
        <div id="styleGenerationStatus" class="muted">生成接入：检查中...</div>
        <div id="styleGenerationDetail" class="muted"></div>
        <div id="styleProfileMeta" class="muted">档案数量：0</div>
        <div id="styleProfileDetail" class="muted">还没有可用文风档案。</div>
        <div class="style-extract">
          <h3>提炼文风</h3>
          <input id="styleProfileName" placeholder="文风名称">
          <textarea id="styleReferenceText" placeholder="粘贴样文"></textarea>
          <div class="row">
            <button id="extractStyleAndBind">提炼并绑定</button>
            <button class="secondary" id="extractStyleOnly">仅提炼</button>
          </div>
          <div id="styleExtractHint" class="muted"></div>
        </div>
        <div id="styleProfileActions" class="style-actions"></div>
      </section>
      <section class="panel stack">
        <div class="section-head">
          <div>
            <span class="panel-subtitle">运行记录</span>
            <h2>任务中心</h2>
          </div>
        </div>
        <div id="taskCenter" class="stack muted" data-testid="task-center">还没有任务。</div>
      </section>
    </aside>
  </main>
  <script>
    const chatLog = document.querySelector('#chatLog');
    const taskCenter = document.querySelector('#taskCenter');
    const chapter = document.querySelector('#chapter');
    const chapterList = document.querySelector('#chapterList');
    const books = document.querySelector('#books');
    const sessionStatus = document.querySelector('#sessionStatus');
    const residentService = document.querySelector('#residentService');
    const residentBook = document.querySelector('#residentBook');
    const residentTask = document.querySelector('#residentTask');
    const resumeSession = document.querySelector('#resumeSession');
    const nextAction = document.querySelector('#nextAction');
    const nextActionHint = document.querySelector('#nextActionHint');
    const currentBookTitle = document.querySelector('#currentBookTitle');
    const currentBookMeta = document.querySelector('#currentBookMeta');
    const qualitySignal = document.querySelector('#qualitySignal');
    const nextChapterCard = document.querySelector('#nextChapterCard');
    const qualityStages = document.querySelector('#qualityStages');
    const qualityActions = document.querySelector('#qualityActions');
    const qualityArtifacts = document.querySelector('#qualityArtifacts');
    const pendingPreview = document.querySelector('#pendingPreview');
    const memoryReview = document.querySelector('#memoryReview');
    const recoveryHint = document.querySelector('#recoveryHint');
    const styleProfileStatus = document.querySelector('#styleProfileStatus');
    const styleGenerationStatus = document.querySelector('#styleGenerationStatus');
    const styleGenerationDetail = document.querySelector('#styleGenerationDetail');
    const styleProfileMeta = document.querySelector('#styleProfileMeta');
    const styleProfileDetail = document.querySelector('#styleProfileDetail');
    const styleProfileActions = document.querySelector('#styleProfileActions');
    const styleProfileName = document.querySelector('#styleProfileName');
    const styleReferenceText = document.querySelector('#styleReferenceText');
    const styleExtractHint = document.querySelector('#styleExtractHint');
    const messageInput = document.querySelector('#message');
    const roomPrefix = (location.pathname.match(/^\/room\/[^/]+/) || [''])[0];
    const tokenKey = `authoros_token:${roomPrefix || 'single'}`;
    const activeStyleHintPrefix = '下一章将使用文风';
    const announcedProgressEvents = new Set();
    const watchedJobActions = new Map();
    let token = sessionStorage.getItem(tokenKey) || '';
    let cockpit = null;
    let activeChapter = null;

    function headers() {
      return { 'content-type': 'application/json', authorization: `Bearer ${token}` };
    }

    async function api(path, options = {}) {
      const response = await fetch(`${roomPrefix}${path}`, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      if (!response.ok) {
        let payload = {};
        try {
          payload = await response.json();
        } catch {
          payload = {};
        }
        throw new Error(payload.error || response.statusText);
      }
      return response.json();
    }

    function addMessage(text, own = false, error = false) {
      const div = document.createElement('div');
      div.className = `msg ${own ? 'me' : 'assistant'}${error ? ' error' : ''}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function renderAssistantWelcome() {
      if (chatLog.children.length > 0) return;
      addMessage([
        '我在这儿，直接说你想推进哪一步。',
        '可以开新书、继续写、读最新章，也可以把卡住的感觉丢给我，我会先收窄成一个可执行动作。',
      ].join('\n'));
    }

    function quickActionMessage(button) {
      return button.dataset.message || button.textContent.trim();
    }

    async function loginIfNeeded() {
      const session = await fetch('/api/session').then(response => response.json());
      if (!session.tokenRequired) {
        sessionStatus.textContent = session.rooms ? '请选择房间' : '本机会话已连接';
        return true;
      }
      token = sessionStorage.getItem(tokenKey) || prompt('访问码（如果没有配置可留空）') || '';
      if (!token) {
        sessionStatus.textContent = '等待访问码';
        return false;
      }
      if (session.rooms && !roomPrefix) {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (!response.ok) {
          alert((await response.json()).error || 'invalid access code');
          sessionStorage.removeItem(tokenKey);
          location.reload();
          return false;
        }
        const result = await response.json();
        sessionStorage.setItem(`authoros_token:${result.roomPath}`, token);
        location.href = result.roomPath;
        return false;
      }
      sessionStorage.setItem(tokenKey, token);
      sessionStatus.textContent = roomPrefix ? `房间 ${roomPrefix.replace('/room/', '')} 已连接` : '本机会话已连接';
      return true;
    }

    async function loadCockpit() {
      cockpit = await api('/api/cockpit');
      renderCockpit(cockpit);
      renderJobs(cockpit.jobs || []);
      if (cockpit.current && cockpit.current.latestChapter) await loadLatestChapter(false);
    }

    function renderCockpit(data) {
      const model = data.model || {};
      sessionStatus.textContent = `${model.model || '默认模型'} · ${model.apiKeySet ? 'API key 已配置' : 'API key 未配置'}`;
      renderResidentShell(data.session);
      books.innerHTML = '';
      if (!data.books || data.books.length === 0) {
        books.textContent = '还没有书。';
      } else {
        for (const book of data.books) {
          const item = document.createElement('div');
          item.className = `book${data.current && data.current.book.id === book.id ? ' current' : ''}`;
          const title = document.createElement('div');
          title.className = 'book-title';
          title.textContent = book.title;
          const meta = document.createElement('div');
          meta.className = 'muted';
          meta.textContent = `${book.id} · ${book.concept || '暂无概念'}`;
          item.append(title, meta);
          books.appendChild(item);
        }
      }

      if (data.current) {
        const latest = data.current.latestChapter ? `最新第 ${data.current.latestChapter.chapter} 章` : '还没有章节';
        currentBookTitle.textContent = data.current.book.title;
        currentBookMeta.textContent = `${data.current.book.id} · ${latest} · 下一章 ${data.current.state.nextDraftChapter}`;
      } else {
        currentBookTitle.textContent = '还没有当前书。';
        currentBookMeta.textContent = '开一本新书后，这里会显示创作状态。';
      }
      renderChapterWorkbench(data.current);

      if (data.nextAction && data.nextAction.message) {
        nextAction.textContent = data.nextAction.label;
        nextAction.dataset.message = data.nextAction.message;
        nextAction.disabled = false;
        const hint = data.nextAction.kind === 'new_book' ? '告诉助理你想写什么。' : data.nextAction.message;
        const styleHint = nextActionStyleHint(data.nextAction);
        nextActionHint.textContent = styleHint ? `${hint} · ${styleHint}` : hint;
      } else {
        nextAction.textContent = '暂无建议';
        nextAction.dataset.message = '';
        nextAction.disabled = true;
        nextActionHint.textContent = '刷新后再看看。';
      }
      renderQuality(data.quality, data.jobs || []);
      renderStyle(data.style);
    }

    function renderChapterWorkbench(current) {
      chapterList.innerHTML = '';
      const drafted = current && Array.isArray(current.draftedChapters) ? current.draftedChapters : [];
      if (drafted.length === 0) {
        chapterList.textContent = current ? '还没有已起草章节。' : '开书后会显示章节。';
        activeChapter = null;
        return;
      }
      for (const item of drafted) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `secondary${activeChapter === item.chapter ? ' active' : ''}`;
        button.textContent = item.label || `第 ${item.chapter} 章`;
        button.setAttribute('data-chapter', String(item.chapter));
        button.addEventListener('click', () => loadChapter(item.chapter, true));
        chapterList.appendChild(button);
      }
    }

    function renderResidentShell(session) {
      const service = session && session.service ? session.service : { label: '本机服务检查中' };
      const book = session && session.currentBook ? session.currentBook : { label: '暂无当前书' };
      const task = session && session.currentTask
        ? `正在：${session.currentTask.label}`
        : session && session.lastCompleted
        ? `最近完成：${session.lastCompleted.label}`
        : '暂无任务';
      residentService.textContent = service.label || '本机服务在线';
      residentBook.textContent = book.label || '暂无当前书';
      residentTask.textContent = task;
      resumeSession.textContent = session && session.resume ? session.resume.label : '恢复现场';
      resumeSession.disabled = !(session && session.resume && session.resume.available);
      resumeSession.title = session && session.currentTask
        ? session.currentTask.detail
        : session && session.lastCompleted
        ? session.lastCompleted.detail
        : '刷新并回到当前创作现场';
    }

    function renderStyle(style) {
      const profiles = style && Array.isArray(style.profiles) ? style.profiles : [];
      const current = style && style.currentProfile ? style.currentProfile : null;
      const generation = style && style.generation ? style.generation : null;
      if (current) {
        styleProfileStatus.textContent = `已绑定：${current.name || current.id}`;
      } else {
        styleProfileStatus.textContent = '尚未绑定文风';
      }
      styleProfileMeta.textContent = `档案数量：${profiles.length}`;
      renderStyleGeneration(generation);
      const detailSource = current || profiles[0] || null;
      const antiAiVoice = detailSource && detailSource.rules && Array.isArray(detailSource.rules.antiAiVoice)
        ? detailSource.rules.antiAiVoice.find(Boolean)
        : '';
      const detail = detailSource && (detailSource.description || antiAiVoice);
      const rulesPreview = styleRulesPreview(detailSource);
      const fallback = profiles.length > 0 ? '可以从已有档案中绑定当前书。' : '还没有可用文风档案。';
      styleProfileDetail.textContent = [
        detail || fallback,
        rulesPreview ? `规则预览：${rulesPreview}` : '',
      ].filter(Boolean).join('\n');
      renderStyleActions(profiles, current, generation);
    }

    function styleRulesPreview(profile) {
      if (!profile || !profile.rules) return '';
      const rules = [];
      if (Array.isArray(profile.rules.antiAiVoice)) rules.push(...profile.rules.antiAiVoice);
      if (Array.isArray(profile.rules.avoid)) rules.push(...profile.rules.avoid);
      return rules.filter(Boolean).slice(0, 2).join('；');
    }

    function nextActionStyleHint(action) {
      if (!action || !action.styleHint) return '';
      return action.styleHint.includes(activeStyleHintPrefix)
        ? action.styleHint
        : `${activeStyleHintPrefix}：${action.styleHint}`;
    }

    function renderStyleGeneration(generation) {
      const label = generation && generation.label ? generation.label : '未启用';
      styleGenerationStatus.textContent = `生成接入：${label}`;
      styleGenerationStatus.className = generation && generation.active
        ? 'signal-ok'
        : generation && generation.label !== '尚未绑定文风'
        ? 'signal-warning'
        : 'muted';
      styleGenerationDetail.textContent = generation && generation.detail ? generation.detail : '绑定文风后，下一章生成才会收到文风档案。';
    }

    function renderStyleActions(profiles, current, generation) {
      styleProfileActions.innerHTML = '';
      if (!cockpit || !cockpit.current) {
        styleProfileActions.textContent = '开书后可以绑定文风。';
        return;
      }

      if (current) {
        const syncButton = document.createElement('button');
        syncButton.className = 'secondary';
        syncButton.textContent = generation && generation.active ? '重新同步到写作生成' : '同步到写作生成';
        syncButton.addEventListener('click', () => bindStyleProfileFromCockpit(current.id));
        styleProfileActions.appendChild(syncButton);
      }

      if (!profiles.length) {
        const empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = '还没有可绑定的文风档案。';
        styleProfileActions.appendChild(empty);
        return;
      }

      for (const profile of profiles) {
        const option = document.createElement('div');
        option.className = 'profile-option';
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = profile.name || profile.id;
        const meta = document.createElement('div');
        meta.className = 'muted';
        meta.textContent = profile.description || profile.id;
        const button = document.createElement('button');
        button.className = 'secondary';
        button.textContent = current && profile.id === current.id ? '已绑定' : '绑定到当前书';
        button.disabled = Boolean(current && profile.id === current.id);
        button.addEventListener('click', () => bindStyleProfileFromCockpit(profile.id));
        option.append(title, meta, button);
        styleProfileActions.appendChild(option);
      }
    }

    async function bindStyleProfileFromCockpit(profileId) {
      try {
        await api('/api/style/bind', { method: 'POST', body: JSON.stringify({ profileId }) });
        addMessage('文风已同步到写作生成。');
        await loadCockpit();
      } catch (error) {
        addMessage(`文风绑定失败：${error.message}`, false, true);
      }
    }

    async function extractStyleFromCockpit(bind) {
      const name = styleProfileName.value.trim();
      const text = styleReferenceText.value.trim();
      if (!name || !text) {
        styleExtractHint.textContent = '需要填写名称和样文。';
        return;
      }
      styleExtractHint.textContent = '正在提炼文风...';
      try {
        const result = await api('/api/style/extract', {
          method: 'POST',
          body: JSON.stringify({ name, text, bind }),
        });
        styleProfileName.value = '';
        styleReferenceText.value = '';
        const summary = formatStyleSummary(result.summary);
        styleExtractHint.textContent = summary || (result.binding ? '已提炼并绑定。' : '已提炼。');
        addMessage([
          result.binding ? '文风已提炼并绑定到当前书。' : '文风已提炼，开书后可绑定。',
          summary,
        ].filter(Boolean).join('\n'));
        await loadCockpit();
      } catch (error) {
        styleExtractHint.textContent = `提炼失败：${error.message}`;
        addMessage(`提炼文风失败：${error.message}`, false, true);
      }
    }

    function formatStyleSummary(summary) {
      if (!summary) return '';
      const rules = Array.isArray(summary.rulesPreview) ? summary.rulesPreview.filter(Boolean).slice(0, 2).join('；') : '';
      return [
        `${summary.name || '新文风'}：${summary.description || '已生成文风档案。'}`,
        rules ? `规则预览：${rules}` : '',
      ].filter(Boolean).join('\n');
    }

    function renderQuality(quality, jobs = []) {
      const booklessRecovery = quality ? null : deriveBooklessRecovery(jobs);
      const signal = booklessRecovery
        ? { kind: 'danger', label: `上次任务失败：${jobPhaseLabel(booklessRecovery.failedPhase)}` }
        : quality && quality.signals && quality.signals.length > 0
        ? quality.signals[0]
        : { kind: 'ok', label: '没有当前书' };
      qualitySignal.className = `signal-${signal.kind || 'ok'}`;
      qualitySignal.textContent = signal.label || '质量环路暂无阻塞';

      nextChapterCard.innerHTML = '';
      qualityStages.innerHTML = '';
      qualityActions.innerHTML = '';
      qualityArtifacts.innerHTML = '';
      pendingPreview.innerHTML = '';
      memoryReview.innerHTML = '';
      recoveryHint.innerHTML = '';

      if (!quality) {
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = '没有当前书';
        const meta = document.createElement('div');
        meta.className = 'muted';
        meta.textContent = '开一本新书后，这里会显示下一章生产线。';
        nextChapterCard.append(title, meta);
        qualityActions.textContent = '没有可执行质量动作。';
        qualityArtifacts.textContent = '没有质量产物。';
        pendingPreview.textContent = '没有待确认预览。';
        memoryReview.textContent = '没有记忆更新。';
        if (booklessRecovery) {
          renderRecovery(booklessRecovery);
        } else {
          recoveryHint.textContent = '没有失败恢复。';
        }
        return;
      }

      const next = quality.nextChapter;
      if (next) {
        const label = document.createElement('div');
        label.className = 'book-title';
        label.textContent = next.label || `第 ${next.chapter} 章生产线`;
        const state = document.createElement('div');
        state.className = 'muted';
        state.textContent = next.blockers && next.blockers.length > 0 ? next.blockers.join('；') : '可继续';
        nextChapterCard.append(label, state);

        for (const stage of next.stages || []) {
          qualityStages.appendChild(renderStagePill(stage));
        }
      } else {
        nextChapterCard.textContent = '没有当前书。';
      }

      renderQualityActions(quality.actions || []);
      renderQualityArtifacts(quality.artifacts || []);

      if (quality.pendingPreview) {
        const previewTitle = document.createElement('div');
        previewTitle.className = 'book-title';
        previewTitle.textContent = `第 ${quality.pendingPreview.chapter} 章待确认预览`;
        const previewText = document.createElement('div');
        previewText.textContent = quality.pendingPreview.text;
        const previewMeta = document.createElement('div');
        previewMeta.className = 'muted';
        previewMeta.textContent = `${quality.pendingPreview.rationale || quality.pendingPreview.instruction} · ${quality.pendingPreview.createdAt}`;
        pendingPreview.append(previewTitle, previewText, previewMeta);
        if (quality.pendingPreview.previewContent) {
          const feedbackContentTitle = document.createElement('div');
          feedbackContentTitle.className = 'muted';
          feedbackContentTitle.textContent = '修改预览正文';
          const feedbackContent = document.createElement('pre');
          feedbackContent.id = 'feedbackPreviewContent';
          feedbackContent.className = 'memory-delta-content';
          feedbackContent.textContent = quality.pendingPreview.previewContent;
          const feedbackStats = document.createElement('div');
          feedbackStats.className = 'muted';
          feedbackStats.textContent = `原文 ${quality.pendingPreview.originalCharCount || 0} 字 · 预览 ${quality.pendingPreview.revisedCharCount ?? '未知'} 字`;
          pendingPreview.append(feedbackContentTitle, feedbackContent, feedbackStats);
        }
        const feedbackApplyButton = document.createElement('button');
        feedbackApplyButton.textContent = '确认应用修改';
        feedbackApplyButton.addEventListener('click', () => sendMessage('确认应用修改').catch(error => addMessage(`失败：${error.message}`, false, true)));
        pendingPreview.appendChild(feedbackApplyButton);
      }

      if (quality.styleRewritePreview) {
        const stylePreview = quality.styleRewritePreview;
        const styleTitle = document.createElement('div');
        styleTitle.className = 'book-title';
        styleTitle.textContent = `第 ${stylePreview.chapter} 章文风改写预览`;
        const styleText = document.createElement('div');
        styleText.textContent = `${stylePreview.profileName} · ${styleRewriteIntentLabel(stylePreview.intent)}`;
        const styleMeta = document.createElement('div');
        styleMeta.className = 'muted';
        styleMeta.textContent = `${stylePreview.rationale || stylePreview.text} · ${stylePreview.createdAt}`;
        const styleContentTitle = document.createElement('div');
        styleContentTitle.className = 'muted';
        styleContentTitle.textContent = '文风预览正文';
        const styleContent = document.createElement('pre');
        styleContent.id = 'styleRewritePreviewContent';
        styleContent.className = 'memory-delta-content';
        styleContent.textContent = stylePreview.previewContent || '这次文风预览没有正文内容。';
        const styleStats = document.createElement('div');
        styleStats.className = 'muted';
        styleStats.textContent = `原文 ${stylePreview.originalCharCount || 0} 字 · 预览 ${stylePreview.revisedCharCount ?? '未知'} 字`;
        const applyButton = document.createElement('button');
        applyButton.textContent = '应用文风修改';
        applyButton.addEventListener('click', () => sendMessage('应用文风修改').catch(error => addMessage(`失败：${error.message}`, false, true)));
        pendingPreview.append(styleTitle, styleText, styleMeta, styleContentTitle, styleContent, styleStats, applyButton);
      }

      if (!quality.pendingPreview && !quality.styleRewritePreview) {
        pendingPreview.textContent = '没有待确认预览。';
      }

      if (quality.memoryDeltas && quality.memoryDeltas.length > 0) {
        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = '记忆更新待审阅';
        memoryReview.appendChild(title);
        for (const delta of quality.memoryDeltas) {
          const item = document.createElement('div');
          item.className = 'row';
          const meta = document.createElement('span');
          meta.className = 'muted';
          meta.textContent = `${delta.name} · ${delta.description}`;
          const view = document.createElement('button');
          view.type = 'button';
          view.className = 'secondary';
          view.textContent = '查看记忆更新';
          view.addEventListener('click', () => loadMemoryDelta(delta.name).catch(error => addMessage(`读取记忆更新失败：${error.message}`, false, true)));
          const mark = document.createElement('button');
          mark.type = 'button';
          mark.className = 'secondary';
          mark.textContent = '标记已合并';
          mark.addEventListener('click', () => markMemoryDeltaReviewed(delta.name).catch(error => addMessage(`标记记忆更新失败：${error.message}`, false, true)));
          item.append(meta, view, mark);
          memoryReview.appendChild(item);
        }
      } else {
        memoryReview.textContent = '没有记忆更新。';
      }

      if (quality.recovery) {
        renderRecovery(quality.recovery);
      } else {
        recoveryHint.textContent = '没有失败恢复。';
      }
    }

    async function loadMemoryDelta(name) {
      const result = await api(`/api/memory/deltas/${encodeURIComponent(name)}`);
      let title = memoryReview.querySelector('[data-memory-delta-title]');
      if (!title) {
        title = document.createElement('div');
        title.className = 'book-title';
        title.dataset.memoryDeltaTitle = 'true';
        memoryReview.appendChild(title);
      }
      title.textContent = `正在审阅：${result.name || name}`;

      let content = memoryReview.querySelector('#memoryDeltaContent');
      if (!content) {
        content = document.createElement('pre');
        content.id = 'memoryDeltaContent';
        content.className = 'memory-delta-content';
        memoryReview.appendChild(content);
      }
      content.textContent = result.content || '这个记忆更新为空。';
    }

    async function markMemoryDeltaReviewed(name) {
      const result = await api(`/api/memory/deltas/${encodeURIComponent(name)}/reviewed`, { method: 'POST' });
      addMessage(result.alreadyReviewed
        ? `记忆更新已在之前标记为合并：${result.name || name}`
        : `已标记记忆更新为合并：${result.name || name}`);
      await loadCockpit();
    }

    function renderQualityActions(actions) {
      qualityActions.innerHTML = '';
      const normalized = Array.isArray(actions) ? actions.map(normalizeQualityAction).filter(Boolean) : [];
      if (normalized.length === 0) {
        qualityActions.textContent = '没有可执行质量动作。';
        return;
      }
      const title = document.createElement('div');
      title.className = 'book-title';
      title.textContent = '质量动作';
      const row = document.createElement('div');
      row.className = 'quality-actions-row';
      for (const action of normalized) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = action.primary ? '' : 'secondary';
        button.textContent = action.label;
        button.dataset.message = action.message;
        button.addEventListener('click', () => sendMessage(action.message).catch(error => addMessage(`失败：${error.message}`, false, true)));
        row.appendChild(button);
      }
      qualityActions.append(title, row);
    }

    function renderQualityArtifacts(artifacts) {
      qualityArtifacts.innerHTML = '';
      const normalized = Array.isArray(artifacts) ? artifacts.filter(isQualityArtifact) : [];
      if (normalized.length === 0) {
        qualityArtifacts.textContent = '没有质量产物。';
        return;
      }
      const title = document.createElement('div');
      title.className = 'book-title';
      title.textContent = '质量产物';
      qualityArtifacts.appendChild(title);
      for (const artifact of normalized) {
        const item = document.createElement('div');
        item.className = 'row';
        const meta = document.createElement('span');
        meta.className = 'muted';
        meta.textContent = `${artifact.label} · ${artifact.path}`;
        const view = document.createElement('button');
        view.type = 'button';
        view.className = 'secondary';
        view.textContent = '查看产物';
        view.addEventListener('click', () => loadQualityArtifact(artifact).catch(error => addMessage(`读取质量产物失败：${error.message}`, false, true)));
        item.append(meta, view);
        qualityArtifacts.appendChild(item);
      }
    }

    function isQualityArtifact(artifact) {
      return artifact
        && typeof artifact === 'object'
        && typeof artifact.type === 'string'
        && typeof artifact.label === 'string'
        && Number.isInteger(artifact.chapter)
        && artifact.chapter > 0
        && typeof artifact.path === 'string';
    }

    async function loadQualityArtifact(artifact) {
      const result = await api(`/api/quality/artifacts/${artifact.type}/${artifact.chapter}`);
      let title = qualityArtifacts.querySelector('[data-quality-artifact-title]');
      if (!title) {
        title = document.createElement('div');
        title.className = 'book-title';
        title.dataset.qualityArtifactTitle = 'true';
        qualityArtifacts.appendChild(title);
      }
      title.textContent = `正在查看：${result.path || artifact.path}`;

      let content = qualityArtifacts.querySelector('#qualityArtifactContent');
      if (!content) {
        content = document.createElement('pre');
        content.id = 'qualityArtifactContent';
        content.className = 'memory-delta-content';
        qualityArtifacts.appendChild(content);
      }
      content.textContent = result.content || '这个质量产物为空。';
    }

    async function previewCompletedJobArtifact(event, action) {
      const memoryDeltaName = memoryDeltaNameFromCompletedJob(event, action);
      if (memoryDeltaName) {
        await loadMemoryDelta(memoryDeltaName);
        return;
      }
      const artifact = qualityArtifactFromCompletedJob(event, action);
      if (artifact) await loadQualityArtifact(artifact);
    }

    function qualityArtifactFromCompletedJob(event, action) {
      const data = completedJobData(event);
      const chapter = data.chapter;
      if (!Number.isInteger(chapter) || chapter < 1) return null;
      const path = completedJobPath(data);
      const type = qualityArtifactType(action, path);
      if (!type) return null;
      return {
        type,
        chapter,
        label: qualityArtifactLabel(type, chapter),
        path: path || qualityArtifactDefaultPath(type, chapter),
      };
    }

    function memoryDeltaNameFromCompletedJob(event, action) {
      if (action !== 'memory_update') return '';
      const data = completedJobData(event);
      const path = typeof data.path === 'string' ? data.path : '';
      const match = path.match(/(?:^|\/)(chapter-\d{4}\.delta\.md)$/);
      return match ? match[1] : '';
    }

    function completedJobData(event) {
      return event && event.data && typeof event.data === 'object' && !Array.isArray(event.data)
        ? event.data
        : {};
    }

    function completedJobPath(data) {
      if (typeof data.path === 'string') return data.path;
      if (Array.isArray(data.artifacts)) {
        return data.artifacts.find(item => typeof item === 'string') || '';
      }
      return '';
    }

    function qualityArtifactType(action, path) {
      if (action === 'internal_review' || /\.internal\.md$/.test(path)) return 'internal_review';
      if (action === 'reader_sim_review' || /\.reader-sim\.md$/.test(path)) return 'reader_sim_review';
      if (action === 'chapter_decision' || /^decisions\/\d{4}\.md$/.test(path)) return 'chapter_decision';
      return '';
    }

    function qualityArtifactLabel(type, chapter) {
      const labels = {
        internal_review: '内评',
        reader_sim_review: '读者模拟',
        chapter_decision: '决策',
      };
      return `第 ${chapter} 章${labels[type] || '质量产物'}`;
    }

    function qualityArtifactDefaultPath(type, chapter) {
      const id = String(chapter).padStart(4, '0');
      if (type === 'internal_review') return `reviews/${id}.internal.md`;
      if (type === 'reader_sim_review') return `reviews/${id}.reader-sim.md`;
      return `decisions/${id}.md`;
    }

    function normalizeQualityAction(action) {
      if (!action || typeof action !== 'object') return null;
      if (typeof action.message !== 'string' || !action.message.trim()) return null;
      const label = typeof action.label === 'string' && action.label.trim()
        ? action.label.trim()
        : qualityActionLabel(action.type);
      return {
        type: action.type,
        label,
        message: action.message.trim(),
        primary: action.primary === true,
      };
    }

    function renderRecovery(recovery) {
      const failure = failureDetail(recovery);
      const title = document.createElement('div');
      title.className = 'book-title';
      title.textContent = `失败恢复：${jobActionLabel(recovery.action)} · ${jobPhaseLabel(recovery.failedPhase)}`;
      const message = document.createElement('div');
      message.textContent = failure.title;
      const detail = document.createElement('div');
      detail.className = 'muted';
      detail.textContent = failure.detail;
      const suggestion = document.createElement('div');
      suggestion.className = 'muted';
      suggestion.textContent = failure.next;
      const actions = renderRecoveryActions(recovery, failure);
      recoveryHint.append(title, message, detail, suggestion);
      if (actions) recoveryHint.appendChild(actions);
    }

    function renderRecoveryActions(recovery, failure) {
      const actions = recoveryActions(recovery, failure);
      if (actions.length === 0) return null;
      const row = document.createElement('div');
      row.className = 'recovery-actions';
      for (const action of actions) {
        const button = document.createElement('button');
        button.className = action.primary ? '' : 'secondary';
        button.type = 'button';
        button.textContent = action.label;
        button.dataset.recoveryAction = action.type;
        if (action.message) button.dataset.message = action.message;
        button.addEventListener('click', () => handleRecoveryAction(button));
        row.appendChild(button);
      }
      return row;
    }

    function recoveryActions(recovery, failure) {
      const serverActions = Array.isArray(recovery && recovery.actions)
        ? recovery.actions.map(normalizeRecoveryAction).filter(Boolean)
        : [];
      if (serverActions.length > 0) return serverActions;

      const actions = [];
      const retryMessage = retryMessageForAction(recovery && recovery.action);
      if (retryMessage) actions.push({ label: '一键重试', type: 'send', message: retryMessage, primary: true });
      if (shouldShowModelConfigAction(failure)) actions.push({ label: '检查模型配置', type: 'model_config' });
      actions.push({ label: '读最新章', type: 'read_latest' });
      actions.push({ label: '回到当前书', type: 'resume' });
      return actions;
    }

    function normalizeRecoveryAction(action) {
      if (!action || typeof action !== 'object') return null;
      const allowed = ['send', 'model_config', 'read_latest', 'resume'];
      if (!allowed.includes(action.type) || typeof action.label !== 'string') return null;
      const normalized = { type: action.type, label: action.label };
      if (typeof action.message === 'string' && action.message.trim()) normalized.message = action.message;
      if (action.primary === true) normalized.primary = true;
      return normalized;
    }

    function retryMessageForAction(action) {
      const messages = {
        continue_book: '继续写',
        read_chapter: '读最新章',
        feedback_apply: '确认应用修改',
        style_rewrite_preview: '帮这一章去 AI 味',
        style_rewrite_apply: '应用文风修改',
        internal_review: '生成第 1 章内评',
        reader_sim_review: '生成第 1 章读者模拟',
        chapter_decision: '生成第 1 章决策',
        memory_update: '生成第 1 章记忆更新',
        download_current_chapter: '下载这一章',
        download_all_chapters: '下载全部章节',
        status: '检查状态',
      };
      return messages[action] || '';
    }

    function shouldShowModelConfigAction(failure) {
      if (!failure || !failure.kind) return true;
      return ['model_config', 'network', 'model_timeout', 'model_length', 'unknown'].includes(failure.kind);
    }

    function handleRecoveryAction(button) {
      const action = button.dataset.recoveryAction;
      const message = button.dataset.message || '';
      if (action === 'send' && message) {
        sendMessage(message).catch(error => addMessage(`重试失败：${error.message}`, false, true));
        return;
      }
      if (action === 'model_config') {
        showModelConfigAdvice();
        return;
      }
      if (action === 'read_latest') {
        addMessage('我先帮你读最新章，确认当前正文状态。');
        loadLatestChapter(true).catch(error => addMessage(`读取失败：${error.message}`, false, true));
        return;
      }
      if (action === 'resume') {
        resumeCurrentSession().catch(error => addMessage(`恢复失败：${error.message}`, false, true));
      }
    }

    function showModelConfigAdvice() {
      const model = cockpit && cockpit.model ? cockpit.model : {};
      addMessage([
        '正在检查模型配置...',
        `模型：${model.model || '默认模型'}`,
        `API key：${model.apiKeySet ? '已配置' : '未配置'}`,
        `Base URL：${model.baseUrl || '默认'}`,
      ].join('\n'));
      api('/api/model/doctor')
        .then(result => addMessage(formatModelDoctor(result)))
        .catch(error => addMessage(`模型配置检查失败：${error.message}`, false, true));
    }

    function formatModelDoctor(result) {
      const doctor = result && result.doctor ? result.doctor : {};
      const scope = result && result.scope ? result.scope : {};
      const blockers = Array.isArray(doctor.blockers) ? doctor.blockers.filter(Boolean) : [];
      const scopeLabel = scope.kind === 'current_book'
        ? `当前书：${scope.label || scope.bookId || '未命名'}`
        : scope.label || '个人根目录';
      return [
        '模型配置检查结果',
        `范围：${scopeLabel}`,
        `状态：${doctor.ready ? '可以调用模型' : '还缺配置'}`,
        `API key env：${doctor.apiKeyEnv || 'OPENAI_API_KEY'}（${doctor.apiKeySet ? '已设置' : '未设置'}）`,
        `Base URL：${doctor.baseUrl || '默认'}`,
        `模型：${doctor.model || '未设置'}`,
        blockers.length > 0 ? `阻塞项：\n- ${blockers.join('\n- ')}` : '阻塞项：无',
        doctor.ready
          ? '下一步：可以直接一键重试。'
          : '下一步：补齐上面的阻塞项后，再回到失败恢复里重试。',
      ].join('\n');
    }

    function deriveBooklessRecovery(jobs) {
      const failed = (jobs || [])
        .filter(job => job.status === 'failed')
        .sort(compareJobsNewestFirst)[0];
      if (!failed) return null;
      const lastPhase = [...(failed.events || [])].reverse().find(event => event.type !== 'failed');

      return {
        action: failed.action,
        failedPhase: lastPhase ? lastPhase.type : failed.action,
        message: failureDetail(failed).title,
        suggestion: failureDetail(failed).next || recoverySuggestion(failed.action),
        failure: failed.failure,
      };
    }

    function failureDetail(source) {
      const failure = source && (source.failure || source.data);
      if (failure && failure.title) {
        return {
          title: failure.title,
          detail: failure.detail || '',
          next: failure.next || '',
        };
      }
      const fallback = source && (source.message || source.error) ? source.message || source.error : '任务失败';
      return {
        title: fallback,
        detail: fallback,
        next: source && source.suggestion ? source.suggestion : '查看失败原因后，重新执行上一步。',
      };
    }

    function compareJobsNewestFirst(a, b) {
      const byCreatedAt = String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      if (byCreatedAt !== 0) return byCreatedAt;

      const aSequence = jobSequence(a.id);
      const bSequence = jobSequence(b.id);
      if (aSequence !== undefined && bSequence !== undefined) return bSequence - aSequence;

      return String(b.id || '').localeCompare(String(a.id || ''));
    }

    function jobSequence(id) {
      const match = String(id || '').match(/^job-(\d+)$/);
      return match ? Number(match[1]) : undefined;
    }

    function recoverySuggestion(action) {
      if (action === 'read_chapter') return '确认已有正文后，再读取最新章。';
      if (action === 'continue_book') return '检查模型配置后，可以再次发送“继续写”。';
      return '查看失败原因后，重新执行上一步。';
    }

    function styleRewriteIntentLabel(intent) {
      const labels = {
        imitate_style: '仿写文风',
        remove_ai_voice: '去 AI 味',
        style_polish: '文风润色',
      };
      return labels[intent] || '文风改写';
    }

    function qualityActionLabel(type) {
      const labels = {
        internal_review: '生成内评',
        reader_sim_review: '生成读者模拟',
        chapter_decision: '生成决策',
        memory_update: '生成记忆更新',
      };
      return labels[type] || '执行质量动作';
    }

    function jobActionLabel(action) {
      const labels = {
        read_chapter: '读取章节',
        continue_book: '继续写作',
        feedback_preview: '生成修改预览',
        feedback_apply: '应用修改',
        style_rewrite_preview: '生成文风改写预览',
        style_rewrite_apply: '应用文风修改',
        internal_review: '生成内评',
        reader_sim_review: '生成读者模拟',
        chapter_decision: '生成创作决策',
        memory_update: '生成记忆更新',
        new_book_confirmed: '创建新书',
        create_book_and_continue: '创建并续写',
        download_current_chapter: '下载当前章',
        download_all_chapters: '下载全部章节',
      };
      return labels[action] || action;
    }

    function jobPhaseLabel(phase) {
      const labels = {
        received: '接收任务',
        setup: '建立设定',
        planning: '规划章节',
        completed: '已完成',
        failed: '失败',
        revision_preview: '生成修改预览',
        applying: '应用修改',
        style_check: '生成文风改写预览',
        style_apply: '应用文风修改',
        internal_review: '生成内评',
        reader_sim_review: '生成读者模拟',
        chapter_decision: '生成创作决策',
        memory_update: '生成记忆更新',
        interrupted: '任务中断',
      };
      return labels[phase] || phase;
    }

    function jobStatusLabel(status) {
      const labels = {
        running: '进行中',
        completed: '已完成',
        failed: '失败',
      };
      return labels[status] || status;
    }

    function renderStagePill(stage) {
      const pill = document.createElement('span');
      pill.className = `stage-pill ${stage.status}`;
      pill.textContent = `${stage.label} · ${stageStatusLabel(stage.status)}`;
      return pill;
    }

    function stageStatusLabel(status) {
      const labels = {
        done: '已完成',
        next: '下一步',
        missing: '缺失',
        optional: '可选',
      };
      return labels[status] || status;
    }

    async function refreshJobs() {
      const result = await api('/api/jobs');
      renderJobs(result.jobs || []);
    }

    function renderJobs(jobs) {
      taskCenter.innerHTML = '';
      if (!jobs || jobs.length === 0) {
        taskCenter.textContent = '还没有任务。';
        return;
      }
      for (const job of jobs.slice(0, 8)) {
        const last = job.events && job.events.length ? job.events[job.events.length - 1] : null;
        const item = document.createElement('div');
        item.className = 'job';
        const top = document.createElement('div');
        top.className = 'job-top';
        const action = document.createElement('span');
        action.textContent = jobActionLabel(job.action);
        const status = document.createElement('span');
        status.textContent = jobStatusLabel(job.status);
        top.append(action, status);
        const message = document.createElement('div');
        message.className = 'muted';
        message.textContent = last ? last.message : '等待事件。';
        const phaseNote = renderPhaseNote(last, job.action);
        item.append(top, message);
        if (phaseNote) item.appendChild(phaseNote);
        taskCenter.appendChild(item);
      }
    }

    function renderPhaseNote(event, action) {
      const explanation = phaseExplanation(event && event.type, action);
      if (!explanation) return null;
      const note = document.createElement('div');
      note.className = 'phase-note';
      const title = document.createElement('div');
      title.className = 'phase-note-title';
      title.textContent = explanation.title;
      const body = document.createElement('div');
      body.className = 'phase-note-body';
      body.textContent = [explanation.detail, explanation.next ? `下一步：${explanation.next}` : ''].filter(Boolean).join('\n');
      note.append(title, body);
      return note;
    }

    function phaseExplanation(phase, action) {
      const explanations = {
        received: {
          title: '我已经接住这个任务',
          detail: '我会先判断它属于开书、续写、读章还是改稿，再进入对应流程。',
          next: '如果任务需要模型，会马上进入设定、规划或预览阶段。',
        },
        setup: {
          title: '我正在建立这本书的底盘',
          detail: '这一步会整理作品定位、世界观、人物关系和大纲。底盘稳，后面的章节才不容易散。',
          next: action === 'create_book_and_continue' ? '设定完成后会继续规划并写第 1 章。' : '完成后你可以检查书的方向，再决定是否继续写。',
        },
        planning: {
          title: '我正在把下一章拆成可写的节拍',
          detail: '这一步会把剧情推进、冲突变化和结尾钩子先排清楚，再交给正文生成。',
          next: '规划完成后会进入正文生成，完成时我会自动读出最新章。',
        },
        revision_preview: {
          title: '我正在做一版可确认的修改预览',
          detail: '正文现在不会被覆盖。我会先把你的反馈转成预览，等你确认后才应用。',
          next: '看完预览后，可以说“确认应用修改”。',
        },
        applying: {
          title: '我正在把已确认的修改写回正文',
          detail: '这一步会读取待确认预览，并把确认过的版本应用到当前章。',
          next: '完成后我会刷新章节，你可以直接读新版本。',
        },
        style_check: {
          title: '我正在按绑定文风做一版改写预览',
          detail: '这一步会处理仿写文风、去 AI 味或文风润色，但仍然先生成预览。',
          next: '满意后再说“应用文风修改”。',
        },
        style_apply: {
          title: '我正在把文风预览写回正文',
          detail: '这一步会检查预览是否仍对应当前章，避免覆盖掉你后来改过的内容。',
          next: '完成后可以读最新章，确认风格是否贴近。',
        },
        internal_review: {
          title: '我正在生成章节内评',
          detail: '这一步会让世界、人物、剧情和风格顾问先看一遍，再由编辑汇总成可执行意见。',
          next: '内评完成后，可以生成读者模拟或进入章节决策。',
        },
        reader_sim_review: {
          title: '我正在生成读者模拟',
          detail: '这一步会从模拟读者角度检查可读性、期待感和可能流失的位置。',
          next: '读者模拟完成后，如果内评也齐了，就可以生成章节决策。',
        },
        chapter_decision: {
          title: '我正在生成章节决策',
          detail: '这一步会综合规划、内评、读者模拟和真实反馈，形成下一章可继承的取舍。',
          next: '决策完成后，建议生成记忆更新。',
        },
        memory_update: {
          title: '我正在生成记忆更新',
          detail: '这一步会把本章确定下来的设定、伏笔、人物状态和风格规则提成增量。',
          next: '完成后可以审阅记忆更新，再继续写下一章。',
        },
        interrupted: {
          title: '任务被中断了',
          detail: '通常是服务重启或页面连接断开导致。已经生成的文件不会被我随便覆盖。',
          next: '恢复现场后，可以按失败提示重试上一步。',
        },
      };
      return explanations[phase] || null;
    }

    function announceJobCompletion(event) {
      const completion = event && event.data && event.data.completion ? event.data.completion : null;
      if (!completion) return;
      addMessage([
        '任务完成',
        completion.title,
        completion.detail,
        completion.next ? `下一步建议：${completion.next}` : '',
      ].filter(Boolean).join('\n'));
    }

    function announceJobFailure(event) {
      const failure = failureDetail(event);
      addMessage([
        '任务失败',
        failure.title,
        failure.detail,
        failure.next ? `下一步建议：${failure.next}` : '',
      ].filter(Boolean).join('\n'), false, true);
    }

    function announceJobProgress(jobId, event, action) {
      if (!event || event.type === 'received' || event.type === 'completed' || event.type === 'failed') return;
      const key = `${jobId}:${event.type}:${event.at || ''}`;
      if (announcedProgressEvents.has(key)) return;
      const explanation = phaseExplanation(event.type, action);
      if (!explanation) return;
      announcedProgressEvents.add(key);
      addMessage([
        '进行中',
        explanation.title,
        explanation.detail,
        explanation.next ? `下一步：${explanation.next}` : '',
      ].filter(Boolean).join('\n'));
    }

    async function sendMessage(message) {
      addMessage(message, true);
      const result = await api('/api/chat', { method: 'POST', body: JSON.stringify({ message }) });
      addMessage(result.message || '已收到。');
      if (result.jobId) {
        watchedJobActions.set(result.jobId, result.action);
        watchJob(result.jobId);
      }
      await refreshJobs();
    }

    async function send() {
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.value = '';
      try {
        await sendMessage(message);
      } catch (error) {
        addMessage(`失败：${error.message}`, false, true);
      }
    }

    async function loadLatestChapter(showErrors = true) {
      try {
        const latest = await api('/api/chapters/latest');
        chapter.textContent = latest.content || latest.excerpt || '最新章节为空。';
        activeChapter = latest.chapter || null;
        renderChapterWorkbench(cockpit && cockpit.current);
      } catch (error) {
        if (showErrors) chapter.textContent = `读取失败：${error.message}`;
      }
    }

    async function loadChapter(chapterNumber, showErrors = true) {
      try {
        const selected = await api(`/api/chapters/${chapterNumber}`);
        chapter.textContent = selected.content || selected.excerpt || `第 ${chapterNumber} 章为空。`;
        activeChapter = selected.chapter || chapterNumber;
        renderChapterWorkbench(cockpit && cockpit.current);
      } catch (error) {
        if (showErrors) chapter.textContent = `读取第 ${chapterNumber} 章失败：${error.message}`;
      }
    }

    async function resumeCurrentSession() {
      await loadCockpit();
      if (cockpit && cockpit.current) await loadLatestChapter(true);
      document.querySelector('.workspace').scrollIntoView({ block: 'start' });
    }

    async function handleWatchedJobEvent(id, events, event) {
      const data = JSON.parse(event.data);
      refreshJobs().catch(() => {});
      if (data.type === 'completed' || data.type === 'failed') {
        events.close();
        const refreshed = await loadCockpit()
          .then(() => true)
          .catch(error => {
            addMessage(`刷新失败：${error.message}`, false, true);
            return false;
          });
        if (data.type === 'completed') {
          announceJobCompletion(data);
          loadLatestChapter(false).catch(() => {});
          if (refreshed) {
            await previewCompletedJobArtifact(data, watchedJobActions.get(id))
              .catch(error => addMessage(`读取产物失败：${error.message}`, false, true));
          }
        } else {
          announceJobFailure(data);
        }
        watchedJobActions.delete(id);
      } else {
        announceJobProgress(id, data, watchedJobActions.get(id));
      }
    }

    function watchJob(id) {
      const events = new EventSource(`${roomPrefix}/api/jobs/${id}/events?token=${encodeURIComponent(token)}`);
      events.onmessage = (event) => {
        handleWatchedJobEvent(id, events, event).catch(error => addMessage(`任务事件处理失败：${error.message}`, false, true));
      };
      events.onerror = () => events.close();
    }

    document.querySelector('#send').addEventListener('click', send);
    for (const button of document.querySelectorAll('[data-message]')) {
      button.addEventListener('click', () => {
        sendMessage(quickActionMessage(button)).catch(error => addMessage(`失败：${error.message}`, false, true));
      });
    }
    resumeSession.addEventListener('click', () => resumeCurrentSession().catch(error => addMessage(`恢复失败：${error.message}`, false, true)));
    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) send();
    });
    nextAction.addEventListener('click', () => {
      if (nextAction.dataset.message) sendMessage(nextAction.dataset.message).catch(error => addMessage(`失败：${error.message}`, false, true));
    });
    document.querySelector('#refresh').addEventListener('click', () => loadCockpit().catch(error => addMessage(`刷新失败：${error.message}`, false, true)));
    document.querySelector('#readLatest').addEventListener('click', () => loadLatestChapter(true));
    document.querySelector('#downloadChapter').addEventListener('click', () => location.href = `${roomPrefix}/download/chapter/latest?token=${encodeURIComponent(token)}`);
    document.querySelector('#downloadAll').addEventListener('click', () => location.href = `${roomPrefix}/download/chapters.zip?token=${encodeURIComponent(token)}`);
    document.querySelector('#extractStyleAndBind').addEventListener('click', () => extractStyleFromCockpit(true));
    document.querySelector('#extractStyleOnly').addEventListener('click', () => extractStyleFromCockpit(false));
    loginIfNeeded()
      .then(ready => {
        if (!ready) return undefined;
        renderAssistantWelcome();
        return loadCockpit();
      })
      .catch(error => {
        sessionStatus.textContent = `加载失败：${error.message}`;
        addMessage(`加载失败：${error.message}`, false, true);
      });
  </script>
</body>
</html>
