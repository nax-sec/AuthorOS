simulated_readers:
  - id: R1
    name: 武侠核心读者
    cares:
      - 题材承诺是否兑现
      - 主角选择是否有压力
      - 章节结尾是否想追

  - id: R2
    name: 节奏读者
    cares:
      - 是否拖沓
      - 信息释放是否分层
      - 情绪钩子是否有效

  - id: R3
    name: 逻辑读者
    cares:
      - 设定是否自洽
      - 因果是否闭合
      - 关键转折是否公平

  - id: R4
    name: 人设读者
    cares:
      - 主角是否有魅力
      - 配角是否像活人
      - 人物关系是否变化

  - id: R5
    name: 情绪读者
    cares:
      - 单章情绪是否落地
      - 压力是否被读者感知
      - 爽点或痛点是否来自剧情
