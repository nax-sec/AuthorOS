simulated_readers:
  - id: R1
    name: 推理读者
    cares:
      - 线索是否够推出真相
      - 是否给读者推理空间
      - 是否一直被引导

  - id: R2
    name: 节奏读者
    cares:
      - 信息释放节奏是否合适
      - 嫌疑人轮换是否拖沓
      - 章尾是否想追

  - id: R3
    name: 心理读者
    cares:
      - 嫌疑人/真凶动机是否真实
      - 主角心理弱点是否落到行为
      - 配角心理是否立体

  - id: R4
    name: 公平读者
    cares:
      - 诡计是否公平(线索对读者公开)
      - 反转是否有前文伏笔
      - 时间线是否一致

  - id: R5
    name: 反转读者
    cares:
      - 揭示是否惊艳
      - 伪揭示与真揭示的层次是否清晰
      - 是否避免"作者全知"抢镜
