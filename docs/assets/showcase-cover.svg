<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AuthorOS Private AI Author showcase cover</title>
  <desc id="desc">A product screenshot style cover for AuthorOS, showing a private AI author web bookshelf with chat, story progress, and chapter reading.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="84" y="72" width="1432" height="756" rx="30" fill="#f8fafc" filter="url(#shadow)"/>

  <rect x="84" y="72" width="1432" height="70" rx="30" fill="#0f172a"/>
  <rect x="84" y="112" width="1432" height="30" fill="#0f172a"/>
  <circle cx="130" cy="107" r="11" fill="#f87171"/>
  <circle cx="164" cy="107" r="11" fill="#fbbf24"/>
  <circle cx="198" cy="107" r="11" fill="#34d399"/>
  <text x="244" y="116" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">AuthorOS Private AI Author</text>

  <rect x="126" y="180" width="320" height="598" rx="18" fill="#e2e8f0"/>
  <text x="158" y="224" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Bookshelf</text>
  <rect x="158" y="258" width="254" height="82" rx="14" fill="#ffffff"/>
  <text x="182" y="292" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Cyber HK</text>
  <text x="182" y="322" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="17">chapter 3 ready</text>
  <rect x="158" y="362" width="254" height="82" rx="14" fill="#c7d2fe"/>
  <text x="182" y="396" fill="#1e1b4b" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Detective Real</text>
  <text x="182" y="426" fill="#4338ca" font-family="Inter, Arial, sans-serif" font-size="17">active book</text>
  <rect x="158" y="466" width="254" height="82" rx="14" fill="#ffffff"/>
  <text x="182" y="500" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">New Story</text>
  <text x="182" y="530" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="17">intake questions</text>

  <rect x="486" y="180" width="552" height="598" rx="18" fill="#ffffff"/>
  <text x="526" y="224" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Author Agent</text>
  <rect x="526" y="258" width="396" height="74" rx="16" fill="#f1f5f9"/>
  <text x="550" y="291" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Reader</text>
  <text x="550" y="318" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Can this chapter feel more tense?</text>
  <rect x="610" y="360" width="388" height="114" rx="16" fill="#dbeafe"/>
  <text x="636" y="394" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">AuthorOS</text>
  <text x="636" y="424" fill="#1e40af" font-family="Inter, Arial, sans-serif" font-size="17">Previewing a revision. I will not</text>
  <text x="636" y="450" fill="#1e40af" font-family="Inter, Arial, sans-serif" font-size="17">overwrite until you approve it.</text>
  <rect x="526" y="518" width="208" height="48" rx="12" fill="#2563eb"/>
  <text x="558" y="550" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Apply preview</text>
  <rect x="756" y="518" width="160" height="48" rx="12" fill="#e2e8f0"/>
  <text x="790" y="550" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Download</text>
  <rect x="526" y="620" width="472" height="92" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="554" y="654" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Progress: plan -> write -> review -> revise</text>
  <rect x="554" y="676" width="398" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="554" y="676" width="278" height="12" rx="6" fill="#22c55e"/>

  <rect x="1078" y="180" width="396" height="598" rx="18" fill="#fff7ed"/>
  <text x="1118" y="224" fill="#431407" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Chapter Reader</text>
  <text x="1118" y="278" fill="#7c2d12" font-family="Georgia, serif" font-size="27" font-weight="700">Chapter 1</text>
  <line x1="1118" y1="302" x2="1432" y2="302" stroke="#fed7aa" stroke-width="3"/>
  <text x="1118" y="350" fill="#431407" font-family="Georgia, serif" font-size="22">The case file looked ordinary</text>
  <text x="1118" y="384" fill="#431407" font-family="Georgia, serif" font-size="22">until the town doctor found a</text>
  <text x="1118" y="418" fill="#431407" font-family="Georgia, serif" font-size="22">second pattern hidden inside it.</text>
  <text x="1118" y="486" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Local-first writing loop</text>
  <text x="1118" y="522" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="17">Plan chapters</text>
  <text x="1118" y="552" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="17">Draft long-form prose</text>
  <text x="1118" y="582" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="17">Review with agents</text>
  <text x="1118" y="612" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="17">Apply reader feedback</text>

  <text x="126" y="858" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">Built with Codex as an end-to-end local AI writing product</text>
</svg>
